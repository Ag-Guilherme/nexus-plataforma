<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NEXUS — Plataforma Digital</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#08080e;color:#e8e8f0;font-family:'Inter',system-ui,sans-serif;min-height:100vh;overflow-x:hidden}
::-webkit-scrollbar{width:5px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:#2a2a3a;border-radius:3px}
.ambient{position:fixed;inset:0;pointer-events:none;z-index:0;overflow:hidden}
.ambient::before{content:'';position:absolute;top:-50%;left:-50%;width:200%;height:200%;background:radial-gradient(ellipse at 25% 25%,rgba(0,180,255,.04) 0%,transparent 50%),radial-gradient(ellipse at 75% 75%,rgba(139,92,246,.03) 0%,transparent 50%);animation:ambFloat 30s ease-in-out infinite}
@keyframes ambFloat{0%,100%{transform:translate(0,0)}50%{transform:translate(1%,1%)}}
.login-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
.login-card{width:100%;max-width:420px;background:#0f0f18;border:1px solid #1a1a2e;border-radius:20px;padding:36px;position:relative;overflow:hidden}
.login-card::before{content:'';position:absolute;top:-50%;left:-50%;width:200%;height:200%;background:radial-gradient(ellipse at center,rgba(0,180,255,.03) 0%,transparent 70%);pointer-events:none}
.login-logo{text-align:center;margin-bottom:28px;position:relative}
.login-logo .icon{width:52px;height:52px;border-radius:14px;background:linear-gradient(135deg,#00b4ff,#8b5cf6);display:flex;align-items:center;justify-content:center;margin:0 auto 12px;box-shadow:0 0 30px rgba(0,180,255,.25)}
.login-logo h1{font-size:24px;font-weight:800;letter-spacing:.15em;background:linear-gradient(135deg,#fff,#a0c4ff,#00b4ff);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.login-logo p{font-size:11px;color:#555;margin-top:2px;letter-spacing:.1em;text-transform:uppercase}
.login-tabs{display:flex;gap:2px;margin-bottom:20px;background:#141420;border-radius:8px;padding:2px}
.login-tab{flex:1;padding:8px;text-align:center;border-radius:6px;font-size:12px;font-weight:500;color:#555;cursor:pointer;transition:all .2s;border:none;background:none}
.login-tab.on{background:#00b4ff;color:#000;font-weight:600}
.fg{margin-bottom:14px}
.fg label{display:block;font-size:11px;color:#666;margin-bottom:5px;font-weight:500;text-transform:uppercase;letter-spacing:.05em}
.fg input,.fg select,.fg textarea{background:#141420;border:1px solid #1e1e30;border-radius:8px;padding:10px 14px;color:#fff;font-size:13px;outline:none;width:100%;font-family:inherit;transition:border .2s}
.fg input:focus,.fg select:focus,.fg textarea:focus{border-color:rgba(0,180,255,.5)}
.fg input::placeholder,.fg textarea::placeholder{color:#444}
.btn{padding:8px 16px;border-radius:10px;font-size:13px;font-weight:600;border:none;cursor:pointer;transition:all .2s;display:inline-flex;align-items:center;gap:6px}
.btn-blue{background:#00b4ff;color:#000}.btn-blue:hover{background:#fff}
.btn-ghost{background:#1a1a2e;color:#fff;border:1px solid #2a2a3e}.btn-ghost:hover{background:#252540}
.btn-danger{background:rgba(239,68,68,.15);color:#ef4444;border:1px solid rgba(239,68,68,.2)}.btn-danger:hover{background:rgba(239,68,68,.25)}
.btn-sm{padding:5px 10px;font-size:11px;border-radius:6px}
.bi{width:36px;height:36px;border-radius:8px;border:none;background:transparent;color:#555;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s}
.bi:hover{background:#1a1a2e;color:#fff}
.sidebar{position:fixed;left:0;top:0;bottom:0;width:240px;background:#0a0a14;border-right:1px solid #1a1a2e;z-index:50;overflow-y:auto;transition:width .3s}
.sidebar.shut{width:64px}
.sidebar.shut .ntxt,.sidebar.shut .lsub{display:none}
.sidebar.shut .nav-i{justify-content:center;padding:12px 0}
.side-head{padding:14px 16px;border-bottom:1px solid #1a1a2e;display:flex;align-items:center;gap:10px;height:56px;flex-shrink:0}
.side-head .logo{width:32px;height:32px;border-radius:10px;background:linear-gradient(135deg,#00b4ff,#8b5cf6);display:flex;align-items:center;justify-content:center;flex-shrink:0}

.side-head span{font-size:8px;color:#555;text-transform:uppercase;letter-spacing:.15em}
.side-nav{flex:1;padding:10px 8px;display:flex;flex-direction:column;gap:2px}
.nav-i{display:flex;align-items:center;gap:10px;padding:9px 12px;border-radius:8px;color:#555;font-size:12px;font-weight:500;cursor:pointer;transition:all .2s;border:none;background:none;width:100%;text-align:left}
.nav-i:hover{background:#141420;color:#ccc}
.nav-i.act{background:rgba(0,180,255,.08);color:#00b4ff;border:1px solid rgba(0,180,255,.15)}
.side-foot{padding:10px 16px;border-top:1px solid #1a1a2e;flex-shrink:0}
.adm-user{display:flex;align-items:center;gap:8px;padding:8px;border-radius:8px;background:#141420}
.adm-user .ava{width:30px;height:30px;border-radius:8px;background:linear-gradient(135deg,#00b4ff,#8b5cf6);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:11px;flex-shrink:0}

.main{margin-left:240px;min-height:100vh;transition:margin-left .3s}
.main.exp{margin-left:64px}
.hdr{position:fixed;top:0;left:240px;right:0;height:56px;background:rgba(10,10,18,.92);backdrop-filter:blur(20px);border-bottom:1px solid #1a1a2e;z-index:40;display:flex;align-items:center;padding:0 16px;gap:10px;transition:left .3s}
.hdr.exp{left:64px}
.hdr .srch{flex:1;max-width:460px;position:relative}
.hdr .srch input{background:#141420;border:1px solid #1e1e30;border-radius:8px;padding:8px 12px 8px 34px;color:#fff;font-size:12px;outline:none;width:100%}

.card{background:#141420;border:1px solid #1e1e30;border-radius:14px;overflow:hidden;cursor:pointer;transition:all .3s}
.card:hover{border-color:rgba(0,180,255,.2);transform:translateY(-3px);box-shadow:0 8px 30px rgba(0,0,0,.5)}
.stat-card{background:#141420;border:1px solid #1e1e30;border-radius:14px;padding:18px;transition:all .3s}

.stat-card .icon{width:36px;height:36px;border-radius:9px;display:flex;align-items:center;justify-content:center;margin-bottom:10px}
.stat-card .val{font-size:22px;font-weight:800;color:#fff}
.stat-card .lbl{font-size:10px;color:#555;margin-top:2px}
.badge{display:inline-block;padding:2px 8px;border-radius:999px;font-size:9px;font-weight:700;letter-spacing:.03em}
.bb{background:rgba(0,180,255,.1);color:#00b4ff;border:1px solid rgba(0,180,255,.15)}
.bp{background:rgba(139,92,246,.1);color:#8b5cf6;border:1px solid rgba(139,92,246,.15)}
.bg{background:rgba(16,185,129,.1);color:#10b981;border:1px solid rgba(16,185,129,.15)}
.ba{background:rgba(245,158,11,.1);color:#f59e0b;border:1px solid rgba(245,158,11,.15)}
.bc{background:rgba(236,72,153,.1);color:#ec4899;border:1px solid rgba(236,72,153,.15)}
.by{background:rgba(239,68,68,.1);color:#ef4444;border:1px solid rgba(239,68,68,.15)}
.flt{padding:6px 14px;border-radius:8px;font-size:12px;font-weight:500;border:1px solid #1e1e30;background:#141420;color:#555;cursor:pointer;transition:all .2s;white-space:nowrap}
.flt:hover{background:#1a1a2e;color:#ccc}
.flt.on{background:#00b4ff;color:#000;border-color:#00b4ff;font-weight:700}
.li{display:flex;align-items:center;gap:12px;padding:10px;border-radius:10px;background:rgba(20,20,32,.8);border:1px solid #1e1e30;transition:all .2s;cursor:pointer}
.li:hover{background:#1a1a2e;transform:translateX(3px)}
.sr{display:flex;gap:14px;overflow-x:auto;padding-bottom:8px}
.sr::-webkit-scrollbar{display:none}
.ga{display:grid;grid-template-columns:repeat(auto-fill,minmax(230px,1fr));gap:14px}
.ov{position:fixed;inset:0;background:rgba(0,0,0,.85);backdrop-filter:blur(8px);z-index:60;display:flex;align-items:center;justify-content:center;padding:20px}
.md{width:100%;max-width:560px;background:#0f0f18;border:1px solid #1e1e30;border-radius:18px;overflow:hidden;display:flex;flex-direction:column;max-height:85vh}
.md-head{padding:16px 22px;border-bottom:1px solid #1e1e30;display:flex;align-items:center;justify-content:space-between}
.md-head h3{font-size:15px;font-weight:700;color:#fff}
.md-body{padding:22px;overflow-y:auto;flex:1}
.md-foot{padding:14px 22px;border-top:1px solid #1e1e30;display:flex;justify-content:flex-end;gap:8px}
.tc{position:fixed;top:66px;right:16px;z-index:80;display:flex;flex-direction:column;gap:6px}
.toast{padding:10px 16px;border-radius:8px;font-size:12px;font-weight:500;display:flex;align-items:center;gap:6px;animation:tin .3s ease-out;min-width:260px}
.toast-ok{background:rgba(16,185,129,.15);border:1px solid rgba(16,185,129,.3);color:#10b981}
.toast-er{background:rgba(239,68,68,.15);border:1px solid rgba(239,68,68,.3);color:#ef4444}
.toast-in{background:rgba(0,180,255,.15);border:1px solid rgba(0,180,255,.3);color:#00b4ff}
@keyframes tin{from{transform:translateX(120%);opacity:0}to{transform:translateX(0);opacity:1}}
.pb{height:4px;background:#1e1e30;border-radius:2px;overflow:hidden}
.pf{height:100%;background:linear-gradient(90deg,#00b4ff,#8b5cf6);border-radius:2px;transition:width .5s}
.qo{padding:12px 14px;border-radius:8px;border:1px solid #1e1e30;background:rgba(20,20,32,.4);cursor:pointer;transition:all .2s;margin-bottom:5px;display:flex;align-items:center;gap:10px;font-size:13px}
.qo:hover{background:#1a1a2e}
.qo.s{border-color:#00b4ff;background:rgba(0,180,255,.08)}
.ql{width:24px;height:24px;border-radius:6px;background:#1e1e30;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:11px;flex-shrink:0}
.strs{display:flex;gap:3px}
.str{cursor:pointer;font-size:18px;color:#333;transition:all .15s}
.str.on{color:#f59e0b}
.ld{position:fixed;inset:0;background:#000;z-index:9999;display:flex;flex-direction:column;align-items:center;justify-content:center;transition:opacity .5s}
.sp{width:40px;height:40px;border:2px solid transparent;border-top-color:#00b4ff;border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
.fa{animation:fadeUp .35s ease-out both}
.int-panel{background:#141420;border:1px solid #1e1e30;border-radius:14px;padding:20px;margin-bottom:16px}
.int-panel h3{font-size:14px;font-weight:600;color:#fff;margin-bottom:12px;display:flex;align-items:center;gap:6px}
.tw{background:#141420;border:1px solid #1e1e30;border-radius:14px;overflow:hidden}
.th{display:flex;align-items:center;justify-content:space-between;padding:14px 18px;border-bottom:1px solid #1e1e30}
.th h3{font-size:13px;font-weight:600;color:#fff}
table{width:100%;border-collapse:collapse}
th{text-align:left;padding:10px 16px;font-size:10px;color:#555;text-transform:uppercase;letter-spacing:.08em;border-bottom:1px solid #1e1e30;font-weight:600}
td{padding:10px 16px;font-size:12px;color:#aaa;border-bottom:1px solid #0f0f18}
.fg-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:14px}
.f-card{background:#141420;border:1px solid #1e1e30;border-radius:12px;overflow:hidden;transition:all .3s}
.f-card:hover{border-color:rgba(0,180,255,.2);transform:translateY(-2px)}
.f-card .thumb{aspect-ratio:16/9;background:#1a1a2e;position:relative;overflow:hidden}
.f-card .thumb img{width:100%;height:100%;object-fit:cover}
.f-card .thumb .tb{position:absolute;top:8px;left:8px;padding:2px 7px;border-radius:4px;font-size:9px;font-weight:700;text-transform:uppercase}
.f-card .thumb .tb.v{background:rgba(139,92,246,.8);color:#fff}
.f-card .thumb .tb.b{background:rgba(245,158,11,.8);color:#fff}
.f-card .thumb .tb.a{background:rgba(6,182,212,.8);color:#fff}
.f-card .info{padding:10px}
.f-card .info h4{font-size:11px;font-weight:600;color:#fff;margin-bottom:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.f-card .info p{font-size:9px;color:#555}
.f-card .acts{display:flex;gap:4px;padding:0 10px 10px}
.log-e{display:flex;align-items:center;gap:10px;padding:10px 16px;border-bottom:1px solid #0f0f18}
.log-e .dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.log-e .dot.s{background:#10b981}.log-e .dot.w{background:#f59e0b}.log-e .dot.d{background:#ef4444}.log-e .dot.i{background:#00b4ff}
.log-e .txt{flex:1;font-size:12px;color:#aaa}
.log-e .tm{font-size:10px;color:#444;font-family:monospace}
.empty{text-align:center;padding:50px 20px;color:#444}
.empty h3{font-size:15px;color:#555;margin-bottom:4px}
.empty p{font-size:12px;color:#444}
.player-frame{width:100%;border-radius:12px;border:1px solid #1e1e30;overflow:hidden;margin-bottom:16px;position:relative}
.player-frame iframe{width:100%;aspect-ratio:16/9;border:none}
.player-frame .yt-info{position:absolute;top:8px;right:8px;background:rgba(239,68,68,.8);color:#fff;font-size:9px;padding:2px 8px;border-radius:4px;font-weight:700;display:flex;align-items:center;gap:4px}
.gd-frame{width:100%;border-radius:12px;border:1px solid #1e1e30;overflow:hidden;margin-bottom:16px}
.gd-frame iframe{width:100%;height:700px;border:none;border-radius:12px}
.src-box{background:#0f0f18;border-radius:10px;padding:14px;border:1px solid #1e1e30;margin-bottom:16px}
.src-box h4{font-size:12px;font-weight:600;color:#fff;margin-bottom:8px}
.src-box p{font-size:11px;color:#888;line-height:1.7}
.src-box code{background:#141420;padding:2px 6px;border-radius:4px;font-size:10px;color:#00b4ff}
.src-ex{background:#141420;border:1px solid #1e1e30;border-radius:8px;padding:10px;margin-top:8px;font-size:10px;color:#885;font-family:monospace;word-break:break-all}
.nf-stats{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:12px;margin-bottom:20px}
.nf-stat{background:#141420;border:1px solid #1e1e30;border-radius:12px;padding:14px;text-align:center}
.nf-stat .num{font-size:20px;font-weight:800}
.nf-stat .label{font-size:10px;color:#555;margin-top:3px}
@keyframes waveAnim{0%,100%{height:4px}50%{height:24px}}

.sidebar{transform:translateX(-100%);width:240px!important}
.sidebar.open{transform:translateX(0)}
.main{margin-left:0!important}
.hdr{left:0!important}
.mbg{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:45;display:none}

}

.pg{padding:56px 12px 24px}
.ga{grid-template-columns:1fr}

.nf-stats{grid-template-columns:1fr 1fr}
.gd-frame iframe{height:500px}
}
</style>
</head>
<body>
<div id="app"></div>
<script>
// ================================================
// 🔑 ADMIN ÚNICO — sem sistema multi-usuário
// ================================================
const ADMIN = {
  id: 'admin',
  nm: 'Administrador',
  em: 'admin@nexus.com',
  pw: 'admin123',
  r: 'admin'
};

// Usuários comuns (apenas para registro de consumo, sem funções admin)
let USERS = JSON.parse(localStorage.getItem('nx_users_v2') || '[]');
let S = {
  user: JSON.parse(localStorage.getItem('nx_me_v2') || 'null'),
  at: 'login',
  loginErr: '',
  pg: 'home',
  sb: true,
  sq: '',
  it: null,
  itp: null,
  fl: { v: 'Todos', b: 'Todos', a: 'Todos' },
  vc: null,
  sq2: false, qi: null, qx: 0, qa: [], qd: false,
  stm: false, stt: '',
  sau: false,
  su: false, ut: 'video',
  scf: false,
  sal: false, salc: '',
  saq: false, saqc: '',
  vp: { p: false, t: 0, v: 80, m: false, liked: false },
  bp: { p: 0, z: 1 },
  ap: { p: false, t: 0, v: 80, m: false, liked: false }
};

function setState(u) { Object.assign(S, u); render(); }
function go(p) { setState({ pg: p, vc: null }); window.scrollTo(0, 0); }
function toggleSb() { setState({ sb: !S.sb }); }
function clickIt(item) { setState({ it: item, itp: item.type || 'video' }); }
function goBack() { setState({ it: null, itp: null }); }
function fmtT(s) { const m = Math.floor(s / 60); return m + ':' + Math.floor(s % 60).toString().padStart(2, '0'); }

function toast(m, t = 'in') {
  let c = document.querySelector('.tc');
  if (!c) { c = document.createElement('div'); c.className = 'tc'; document.body.appendChild(c); }
  const e = document.createElement('div'); e.className = 'toast toast-' + t; e.textContent = m; c.appendChild(e);
  setTimeout(() => { e.style.opacity = '0'; e.style.transition = 'opacity .3s'; setTimeout(() => e.remove(), 300); }, 3000);
}

// ================================================
// 🔐 AUTH — Admin único + usuários comuns
// ================================================
function doLogin() {
  const e = document.getElementById('le'), p = document.getElementById('lp');
  if (!e || !p) return;
  const ev = e.value.trim(), pv = p.value;

  // Admin único
  if (ev === ADMIN.em && pv === ADMIN.pw) {
    S.user = { ...ADMIN };
    localStorage.setItem('nx_me_v2', JSON.stringify(S.user));
    addLog('s', 'Admin fez login');
    toast('Bem-vindo, Administrador!', 'ok');
    render();
    return;
  }

  // Usuário comum
  const u = USERS.find(x => x.em === ev && x.pw === pv);
  if (!u) {
    S.loginErr = 'Email ou senha incorretos';
    toast('Credenciais inválidas', 'er');
    render();
    return;
  }
  S.user = u;
  localStorage.setItem('nx_me_v2', JSON.stringify(u));
  addLog('s', u.nm + ' fez login');
  toast('Bem-vindo, ' + u.nm + '!', 'ok');
  render();
}

function doReg() {
  const n = document.getElementById('rn'), e = document.getElementById('re'), p = document.getElementById('rp');
  if (!n || !e || !p) return;
  if (!n.value.trim() || !e.value.trim() || !p.value) { toast('Preencha tudo', 'er'); return; }
  if (p.value.length < 6) { toast('Mínimo 6 caracteres', 'er'); return; }
  if (e.value.trim() === ADMIN.em) { toast('Email reservado', 'er'); return; }
  if (USERS.find(x => x.em === e.value.trim())) { toast('Email já cadastrado', 'er'); return; }
  const nu = { id: 'u' + Date.now(), nm: n.value.trim(), em: e.value.trim(), pw: p.value, r: 'user' };
  USERS.push(nu);
  localStorage.setItem('nx_users_v2', JSON.stringify(USERS));
  S.user = nu;
  localStorage.setItem('nx_me_v2', JSON.stringify(nu));
  addLog('s', 'Novo usuário: ' + nu.nm);
  toast('Conta criada!', 'ok');
  render();
}

function doLogout() {
  addLog('i', S.user?.nm + ' saiu');
  S.user = null;
  localStorage.removeItem('nx_me_v2');
  S.pg = 'home';
  toast('Saiu', 'in');
  render();
}

// ================================================
// 📦 ICONS
// ================================================
const IC = {
  home: '<svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>',

// ================================================
// 🔗 URL HELPERS — YouTube e Google Drive
// ================================================
function extractYTId(url) {
  if (!url) return '';
  let m = url.match(/(?:youtu\.be\/|youtube\.com(?:\/embed\/|\/v\/|\/watch\?v=|\/watch\?.+&v=))([\w-]{11})/);
  if (m) return m[1];
  m = url.match(/youtube\.com\/shorts\/([\w-]{11})/);
  if (m) return m[1];
  return '';
}

function getYTThumb(ytId) {
  return ytId ? `https://img.youtube.com/vi/${ytId}/hqdefault.jpg` : '';
}

function getYTEmbedUrl(url) {
  const id = extractYTId(url);
  return id ? `https://www.youtube.com/embed/${id}?rel=0&modestbranding=1` : '';
}

function extractGDriveId(url) {
  if (!url) return '';
  let m = url.match(/\/d\/([a-zA-Z0-9_-]+)/);
  if (m) return m[1];
  m = url.match(/id=([a-zA-Z0-9_-]+)/);
  if (m) return m[1];
  return '';
}

function getGDPreviewUrl(url) {
  const id = extractGDriveId(url);
  return id ? `https://drive.google.com/file/d/${id}/preview` : '';
}

function getGDThumbUrl(url) {
  const id = extractGDriveId(url);
  return id ? `https://drive.google.com/thumbnail?id=${id}&sz=w400` : '';
}

    if (!ytId) { toast('URL do YouTube inválida', 'er'); return; }
    VIDEOS.unshift({ id: 'v' + Date.now(), t, yt: url, ct: c, au: a, vw: '0', pr: 0, type: 'video' });
    addLog('s', 'Vídeo YouTube adicionado: ' + t);
    toast('Vídeo publicado!', 'ok');
  } else if (S.ut === 'audio') {
    const ytId = extractYTId(url);
    if (!ytId) { toast('URL do YouTube inválida', 'er'); return; }
    AUDIOS.unshift({ id: 'a' + Date.now(), t, yt: url, ct: c, pr: 0, type: 'audio' });
    addLog('s', 'Áudio YouTube adicionado: ' + t);
    toast('Áudio publicado!', 'ok');
  } else if (S.ut === 'book') {
    const gdId = extractGDriveId(url);
    if (!gdId) { toast('URL do Google Drive inválida', 'er'); return; }
    const pg = parseInt(document.getElementById('uP')?.value) || 0;
    BOOKS.unshift({ id: 'b' + Date.now(), t, au: a, gd: url, ct: c, pg, rt: 0, pr: 0, type: 'book' });
    addLog('s', 'Livro Drive adicionado: ' + t);
    toast('Livro publicado!', 'ok');
  }
  saveAll();
  setState({ su: false });
}

function startQz(cid) {
  const c = COURSES.find(x => x.id === cid);
  if (!c || !c.qz.length) { toast('Sem quiz', 'er'); return; }
  S.qi = cid; S.qx = 0; S.qa = new Array(c.qz.length).fill(-1); S.qd = false;
  setState({ sq2: true });
}

function submitQz() {
  const c = COURSES.find(x => x.id === S.qi); if (!c) return;
  let sc = 0; c.qz.forEach((q, i) => { if (S.qa[i] === q.an) sc++; });
  const pct = Math.round(sc / c.qz.length * 100);
  QUIZ_RES[S.qi] = QUIZ_RES[S.qi] || {};
  QUIZ_RES[S.qi].best = Math.max(pct, QUIZ_RES[S.qi].best || 0);
  QUIZ_RES[S.qi].last = pct; QUIZ_RES[S.qi].att = (QUIZ_RES[S.qi].att || 0) + 1;
  QUIZ_RES[S.qi].date = Date.now();
  localStorage.setItem('nx_qr', JSON.stringify(QUIZ_RES));
  addLog('i', 'Quiz: ' + pct + '% em ' + c.t);
  S.qd = true;
  render();
}

function updateSettings() {
  const nm = document.getElementById('setName')?.value?.trim(), em = document.getElementById('setEmail')?.value?.trim();
  if (!nm || !em) { toast('Preencha tudo', 'er'); return; }
  if (S.user?.r === 'admin') {
    S.user = { ...S.user, nm, em };
  } else {
    const idx = USERS.findIndex(x => x.id === S.user.id);
    if (idx >= 0) {
      USERS[idx].nm = nm; USERS[idx].em = em;
      localStorage.setItem('nx_users_v2', JSON.stringify(USERS));
      S.user = USERS[idx];
    }
  }
  localStorage.setItem('nx_me_v2', JSON.stringify(S.user));
  addLog('i', 'Configurações atualizadas');
  toast('Salvo!', 'ok');
  render();
}

// ===== MAIN RENDER =====
function render() {
  const app = document.getElementById('app');
  if (!S.user) { app.innerHTML = renderLogin(); return; }

  const isAdmin = S.user?.r === 'admin';
  let mainContent = '';
  if (S.it && S.itp === 'video') mainContent = renderVP();
  else if (S.it && S.itp === 'book') mainContent = renderBP();
  else if (S.it && S.itp === 'audio') mainContent = renderAP();
  else {
    switch (S.pg) {
      case 'home': mainContent = isAdmin ? renderDashboard() : renderHome(); break;
      case 'addcontent': mainContent = renderAddContent(); break;
      case 'manage': mainContent = renderManage(); break;
      case 'users': mainContent = renderUsersPage(); break;
      case 'courses': mainContent = renderCoursesPage(); break;
      case 'logs': mainContent = renderLogsPage(); break;
      case 'settings': mainContent = renderSettingsPage(); break;
      case 'videos': mainContent = renderVideos(); break;
      case 'books': mainContent = renderBooks(); break;
      case 'audios': mainContent = renderAudios(); break;
      case 'explore': mainContent = renderExplore(); break;
      default: mainContent = isAdmin ? renderDashboard() : renderHome();
    }
  }

  app.innerHTML = `<div class="ambient"></div>${window.innerWidth < 1024 && S.sb ? '<div class="mbg show" onclick="toggleSb()"></div>' : ''}${renderSidebar()}<div class="main ${S.sb && window.innerWidth >= 1024 ? '' : 'exp'}">${renderHeader()}<div class="pg">${mainContent}</div></div>${rModals()}<div class="tc"></div>`;

  // Video timer
  if (S.it && S.itp === 'video' && S.vp.p) {
    if (!window._vt) { window._vt = setInterval(() => { if (S.it && S.itp === 'video' && S.vp.p) { S.vp.t = Math.min(S.vp.t + 1, 1455); render(); } }, 1000); }
  } else { clearInterval(window._vt); window._vt = null; }

  if (S.it && S.itp === 'audio' && S.ap.p) {
    if (!window._at) { window._at = setInterval(() => { if (S.it && S.itp === 'audio' && S.ap.p) { S.ap.t = Math.min(S.ap.t + 1, 2538); render(); } }, 1000); }
  } else { clearInterval(window._at); window._at = null; }
}

setTimeout(() => { const ls = document.getElementById('ls'); if (ls) { ls.style.opacity = '0'; setTimeout(() => { ls.remove(); render(); }, 500); } }, 1000);

document.addEventListener('keydown', e => { if (e.key === 'Escape') { Object.assign(S, { su: false, scf: false, sal: false, saq: false, sau: false, sq2: false, stm: false }); render(); } });
