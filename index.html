    // Video Player
    function renderVideoPlayer() {
      const video = appState.selectedItem;
      const vp = appState.videoPlayer;
      const totalSeconds = 1455;
      if (!video) return '';

      return `
        <div style="min-height:100vh;background:#000;padding-top:64px">
          <button onclick="handleBack()" style="position:fixed;top:80px;left:16px;z-index:30;padding:10px;border-radius:12px;background:rgba(10,10,16,0.8);backdrop-filter:blur(12px);border:1px solid var(--border);color:var(--gray);cursor:pointer;transition:all 0.2s" onmouseover="this.style.color='#fff';this.style.borderColor='rgba(0,180,255,0.2)'" onmouseout="this.style.color='var(--gray)';this.style.borderColor='var(--border)'">
            ${icon('chevronLeft')}
          </button>
          <div style="position:relative;aspect-ratio:16/9;background:var(--surface);overflow:hidden;cursor:pointer" onmousemove="this.querySelector('.controls-overlay').style.opacity=1" onmouseleave="if(appState.videoPlayer.isPlaying)this.querySelector('.controls-overlay').style.opacity=0">
            <img src="${video.thumbnail || video.cover || ''}" style="width:100%;height:100%;object-fit:cover;${vp.isPlaying ? 'opacity:0.7;transform:scale(1.05)' : ''};transition:all 0.7s">
            ${vp.isPlaying ? `<div style="position:absolute;inset:0;pointer-events:none">${Array.from({length: 15}, (_, i) => `<div style="position:absolute;width:1px;background:rgba(0,180,255,0.15);bottom:0;left:${(i+1)*6}%;height:${Math.random()*100+20}px;animation:waveAnim ${Math.random()*2+1.5}s ease-in-out infinite;animation-delay:${Math.random()*2}s"></div>`).join('')}</div>` : ''}
            <div style="position:absolute;inset:0;background:linear-gradient(to top,rgba(0,0,0,0.6) 0%,transparent 30%,transparent 70%,rgba(0,0,0,0.3) 100%)" class="controls-overlay"></div>
            <div class="controls-overlay" style="position:absolute;inset:0;display:flex;flex-direction:column;justify-content:space-between;padding:20px;opacity:1;transition:opacity 0.3s">
              <div><h3 style="font-size:18px;font-weight:600;color:#fff;text-shadow:0 2px 8px rgba(0,0,0,0.8)">${video.title}</h3><p style="font-size:13px;color:rgba(255,255,255,0.7);text-shadow:0 1px 4px rgba(0,0,0,0.8)">${video.author || ''} • ${video.views || ''} visualizações</p></div>
              ${!vp.isPlaying ? `<div style="position:absolute;inset:0;display:flex;align-items:center;justify-content:center"><div onclick="event.stopPropagation();setState({videoPlayer:{...appState.videoPlayer,isPlaying:true}})" style="width:72px;height:72px;border-radius:50%;background:var(--blue);display:flex;align-items:center;justify-content:center;cursor:pointer;box-shadow:0 0 40px rgba(0,180,255,0.4);transition:transform 0.2s" onmouseover="this.style.transform='scale(1.1)'" onmouseout="this.style.transform='scale(1)'">${icon('play', 32)}</div></div>` : ''}
              <div>
                <div style="display:flex;align-items:center;gap:12px;margin-bottom:12px">
                  <span style="font-size:12px;font-family:monospace;color:#fff;min-width:40px">${formatTime(vp.currentTime)}</span>
                  <div style="flex:1;height:4px;background:rgba(255,255,255,0.15);border-radius:2px;cursor:pointer;position:relative" onclick="event.stopPropagation()">
                    <div style="height:100%;width:${(vp.currentTime/totalSeconds)*100}%;background:var(--blue);border-radius:2px;position:relative"><div style="position:absolute;right:-6px;top:-4px;width:12px;height:12px;border-radius:50%;background:#fff;box-shadow:0 0 10px rgba(0,180,255,0.5)"></div></div>
                  </div>
                  <span style="font-size:12px;font-family:monospace;color:var(--gray-dark);min-width:40px">${video.duration || ''}</span>
                </div>
                <div style="display:flex;align-items:center;justify-content:space-between" onclick="event.stopPropagation()">
                  <div style="display:flex;align-items:center;gap:16px">
                    <button onclick="event.stopPropagation();setState({videoPlayer:{...appState.videoPlayer,isPlaying:!appState.videoPlayer.isPlaying}})" style="background:none;border:none;color:#fff;cursor:pointer;padding:4px">${vp.isPlaying ? icon('pause', 22) : icon('play', 22)}</button>
                    <button style="background:none;border:none;color:rgba(255,255,255,0.5);cursor:pointer;padding:4px">${icon('skipForward')}</button>
                    <div style="display:flex;align-items:center;gap:6px">
                      <button onclick="event.stopPropagation();setState({videoPlayer:{...appState.videoPlayer,isMuted:!appState.videoPlayer.isMuted}})" style="background:none;border:none;color:rgba(255,255,255,0.5);cursor:pointer;padding:4px">${vp.isMuted ? icon('volumeX') : icon('volume')}</button>
                      <div style="width:80px;height:3px;background:rgba(255,255,255,0.15);border-radius:2px;cursor:pointer"><div style="height:100%;width:${vp.isMuted?0:vp.volume}%;background:rgba(255,255,255,0.5);border-radius:2px"></div></div>
                    </div>
                  </div>
                  <div style="display:flex;align-items:center;gap:12px">
                    <select onchange="setState({videoPlayer:{...appState.videoPlayer,speed:parseFloat(this.value)}})" style="background:rgba(255,255,255,0.08);border:1px solid var(--border);color:rgba(255,255,255,0.5);padding:4px 8px;border-radius:6px;font-size:12px;cursor:pointer">
                      ${[0.25,0.5,0.75,1,1.25,1.5,1.75,2].map(s => `<option value="${s}" ${vp.speed===s?'selected':''}>${s}x</option>`).join('')}
                    </select>
                    <button style="background:none;border:none;color:rgba(255,255,255,0.5);cursor:pointer;padding:4px">${icon('maximize')}</button>
                  </div>
                </div>
              </div>
            </div>
          </div>
          <div style="max-width:800px;margin:0 auto;padding:24px 16px">
            <h1 style="font-size:20px;font-weight:700;color:#fff;margin-bottom:8px">${video.title}</h1>
            <div style="display:flex;align-items:center;gap:12px;font-size:13px;color:var(--gray-dark);margin-bottom:20px;flex-wrap:wrap">
              <span style="display:flex;align-items:center;gap:4px">${icon('eye', 14)} ${video.views || '0'}</span>
              <span>${video.date || ''}</span>
              ${video.category ? `<span class="badge badge-blue">${video.category}</span>` : ''}
            </div>
            <div style="display:flex;gap:8px;margin-bottom:24px;padding-bottom:20px;border-bottom:1px solid var(--border);flex-wrap:wrap">
              <button onclick="setState({videoPlayer:{...appState.videoPlayer,liked:!appState.videoPlayer.liked}})" class="filter-btn ${vp.liked ? 'active' : ''}" style="display:flex;align-items:center;gap:6px">${icon('thumbsUp')} ${vp.liked ? 'Curtido' : 'Curtir'} ${video.likes ? `<span style="color:var(--gray-dark)">${video.likes}</span>` : ''}</button>
              <button class="filter-btn" style="display:flex;align-items:center;gap:6px">${icon('share')} Compartilhar</button>
              <button class="filter-btn" style="display:flex;align-items:center;gap:6px">${icon('bookmark')} Salvar</button>
            </div>
            <div style="display:flex;align-items:center;gap:16px;margin-bottom:24px">
              <div class="avatar">JR</div>
              <div style="flex:1"><p style="font-weight:600;color:#fff">JR - Desmistificando a Elétrica</p><p style="font-size:13px;color:var(--gray-dark)">1.2M inscritos</p></div>
              <button class="btn-primary" style="padding:10px 24px;border-radius:12px;font-size:13px;border:none;cursor:pointer">Inscrever-se</button>
            </div>
          </div>
        </div>`;
    }

    // Book Reader
    function renderBookReader() {
      const book = appState.selectedItem;
      const br = appState.bookReader;
      if (!book) return '';
      const totalPages = book.pages || 300;
      const currentProgress = ((br.currentPage + 1) / totalPages) * 100;
      const texts = [
        "A engenharia elétrica é uma disciplina fundamental que abrange o estudo e a aplicação da eletricidade, eletrônica e eletromagnetismo. Desde a geração até o consumo final de energia, esta ciência transforma nossa sociedade de maneiras profundas e constantes.",
        "Os circuitos elétricos formam a base de todos os sistemas eletrônicos modernos. Um circuito é um caminho fechado através do qual a corrente elétrica pode fluir, composto por fontes de energia, condutores e componentes que controlam o fluxo de elétrons.",
        "A Lei de Ohm é um dos princípios mais fundamentais da eletricidade. Ela estabelece que a corrente que flui através de um condutor é diretamente proporcional à tensão aplicada e inversamente proporcional à resistência do material.",
        "Os transformadores são dispositivos eletromagnéticos que permitem a transferência de energia elétrica entre circuitos através de indução eletromagnética. Eles são essenciais para a distribuição de energia em larga escala.",
      ];

      return `
        <div style="min-height:100vh;background:var(--surface-2);padding-top:64px;display:flex;flex-direction:column">
          <div style="display:flex;align-items:center;justify-content:space-between;padding:12px 20px;border-bottom:1px solid var(--border)">
            <button onclick="handleBack()" style="background:none;border:none;color:var(--gray);cursor:pointer;padding:8px;border-radius:10px" onmouseover="this.style.color='#fff'" onmouseout="this.style.color='var(--gray)'">${icon('chevronLeft')}</button>
            <div style="text-align:center"><h3 style="font-size:14px;font-weight:600;color:#fff">${book.title}</h3><p style="font-size:11px;color:var(--gray-dark)">${book.author || ''}</p></div>
            <div style="display:flex;align-items:center;gap:4px">
              <button onclick="setState({bookReader:{...appState.bookReader,zoom:Math.max(0.5,appState.bookReader.zoom-0.1)}})" style="background:none;border:none;color:var(--gray);cursor:pointer;padding:8px;border-radius:8px;font-size:14px">A-</button>
              <span style="font-size:11px;color:var(--gray-dark);font-family:monospace;padding:0 8px">${Math.round(br.zoom*100)}%</span>
              <button onclick="setState({bookReader:{...appState.bookReader,zoom:Math.min(2,appState.bookReader.zoom+0.1)}})" style="background:none;border:none;color:var(--gray);cursor:pointer;padding:8px;border-radius:8px;font-size:14px">A+</button>
              <button onclick="setState({bookReader:{...appState.bookReader,bookmarked:!appState.bookReader.bookmarked}})" style="background:none;border:none;color:${br.bookmarked?'var(--blue)':'var(--gray)'};cursor:pointer;padding:8px;border-radius:8px">${icon('bookmarkCheck')}</button>
            </div>
          </div>
          <div style="flex:1;display:flex;align-items:center;justify-content:center;padding:32px 20px;overflow-y:auto">
            <div style="max-width:640px;width:100%;transform:scale(${br.zoom});transform-origin:center center">
              <div style="background:var(--surface-3);border-radius:20px;padding:48px 56px;border:1px solid var(--border)">
                <span style="font-size:10px;color:var(--gray-dark);text-transform:uppercase;letter-spacing:0.2em;font-weight:600">Capítulo ${Math.floor(br.currentPage/20)+1}</span>
                <div style="margin-top:32px;font-size:16px;line-height:1.8;color:rgba(255,255,255,0.75);text-align:justify">${texts[br.currentPage % texts.length]}<br><br>${texts[(br.currentPage+1) % texts.length]}<br><br>${texts[(br.currentPage+2) % texts.length]}</div>
                <div style="margin-top:48px;padding-top:20px;border-top:1px solid var(--border);display:flex;justify-content:space-between;font-size:12px;color:var(--gray-dark)"><span>Página ${br.currentPage + 1} de ${totalPages}</span><span>${Math.round(currentProgress)}%</span></div>
              </div>
            </div>
          </div>
          <div style="padding:16px 20px;border-top:1px solid var(--border)">
            <div style="display:flex;align-items:center;gap:16px;max-width:640px;margin:0 auto">
              <button onclick="setState({bookReader:{...appState.bookReader,currentPage:Math.max(0,appState.bookReader.currentPage-1)}})" ${br.currentPage===0?'disabled style="opacity:0.2"':''} class="btn-icon">${icon('chevronLeft')}</button>
              <div style="flex:1;height:3px;background:rgba(255,255,255,0.06);border-radius:2px"><div style="height:100%;width:${currentProgress}%;background:linear-gradient(90deg,var(--blue),var(--purple));border-radius:2px;transition:width 0.5s"></div></div>
              <button onclick="setState({bookReader:{...appState.bookReader,currentPage:Math.min(${totalPages-1},appState.bookReader.currentPage+1)}})" ${br.currentPage===totalPages-1?'disabled style="opacity:0.2"':''} class="btn-icon">${icon('chevronRight')}</button>
            </div>
          </div>
        </div>`;
    }

    // Audio Player
    function renderAudioPlayer() {
      const audio = appState.selectedItem;
      const ap = appState.audioPlayer;
      if (!audio) return '';
      const totalSeconds = 2538;
      const progress = (ap.currentTime / totalSeconds) * 100;

      return `
        <div style="min-height:100vh;background:#000;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:80px 20px 40px;position:relative">
          <button onclick="handleBack()" style="position:fixed;top:80px;left:16px;z-index:30;padding:10px;border-radius:12px;background:rgba(10,10,16,0.8);backdrop-filter:blur(12px);border:1px solid var(--border);color:var(--gray);cursor:pointer" onmouseover="this.style.color='#fff'" onmouseout="this.style.color='var(--gray)'">${icon('chevronLeft')}</button>
          <div style="width:100%;max-width:400px;text-align:center">
            <div style="position:relative;margin-bottom:40px">
              <div style="aspect-ratio:1;border-radius:24px;overflow:hidden;box-shadow:0 20px 60px rgba(0,0,0,0.5);border:1px solid var(--border)">
                <img src="${audio.cover || audio.thumbnail || ''}" style="width:100%;height:100%;object-fit:cover">
                <div style="position:absolute;inset:0;background:linear-gradient(to top,rgba(0,0,0,0.4) 0%,transparent 50%)"></div>
              </div>
              ${ap.isPlaying ? `<div style="position:absolute;inset:-20px;border-radius:30px;background:rgba(0,180,255,0.05);filter:blur(30px);animation:pulse 3s ease-in-out infinite"></div>` : ''}
            </div>
            <h2 style="font-size:22px;font-weight:700;color:#fff;margin-bottom:4px">${audio.title}</h2>
            <p style="font-size:14px;color:var(--gray-dark)">${audio.category || ''} • ${audio.duration || ''}</p>
            <div style="margin:32px 0">
              <div class="waveform-container">
                ${Array.from({length: 48}, (_, i) => `<div class="waveform-bar ${ap.isPlaying?'active playing':''}" style="height:${ap.isPlaying?Math.random()*36+4:4}px;animation-delay:${i*0.03}s"></div>`).join('')}
              </div>
            </div>
            <div style="display:flex;align-items:center;gap:12px;margin-bottom:32px">
              <span style="font-size:11px;color:var(--gray-dark);font-family:monospace;min-width:36px;text-align:right">${formatTime(ap.currentTime)}</span>
              <div style="flex:1;height:3px;background:rgba(255,255,255,0.06);border-radius:2px;cursor:pointer"><div style="height:100%;width:${progress}%;background:var(--blue);border-radius:2px;position:relative"><div style="position:absolute;right:-5px;top:-3px;width:10px;height:10px;border-radius:50%;background:#fff"></div></div></div>
              <span style="font-size:11px;color:var(--gray-dark);font-family:monospace;min-width:36px">${audio.duration || ''}</span>
            </div>
            <div style="display:flex;align-items:center;justify-content:center;gap:32px;margin-bottom:32px">
              <button style="background:none;border:none;color:var(--gray-dark);cursor:pointer;padding:8px" onmouseover="this.style.color='#fff'" onmouseout="this.style.color='var(--gray-dark)'">${icon('skipBack')}</button>
              <button onclick="setState({audioPlayer:{...appState.audioPlayer,isPlaying:!appState.audioPlayer.isPlaying}})" style="width:64px;height:64px;border-radius:50%;background:var(--blue);display:flex;align-items:center;justify-content:center;border:none;cursor:pointer;box-shadow:0 0 30px rgba(0,180,255,0.3)" onmouseover="this.style.transform='scale(1.08)'" onmouseout="this.style.transform='scale(1)'">${ap.isPlaying ? icon('pause') : icon('play')}</button>
              <button style="background:none;border:none;color:var(--gray-dark);cursor:pointer;padding:8px" onmouseover="this.style.color='#fff'" onmouseout="this.style.color='var(--gray-dark)'">${icon('skipForward')}</button>
            </div>
            <div style="display:flex;align-items:center;justify-content:center;gap:24px;margin-bottom:24px">
              <button onclick="setState({audioPlayer:{...appState.audioPlayer,liked:!appState.audioPlayer.liked}})" style="background:none;border:none;color:${ap.liked?'var(--red)':'var(--gray-dark)'};cursor:pointer;padding:8px">${ap.liked ? icon('heartFilled') : icon('heart')}</button>
              <button onclick="setState({audioPlayer:{...appState.audioPlayer,saved:!appState.audioPlayer.saved}})" style="background:none;border:none;color:${ap.saved?'var(--blue)':'var(--gray-dark)'};cursor:pointer;padding:8px">${ap.saved ? icon('bookmarkFilled') : icon('bookmark')}</button>
              <button style="background:none;border:none;color:var(--gray-dark);cursor:pointer;padding:8px">${icon('share')}</button>
              <button style="background:none;border:none;color:var(--gray-dark);cursor:pointer;padding:8px">${icon('repeat')}</button>
              <button style="background:none;border:none;color:var(--gray-dark);cursor:pointer;padding:8px">${icon('shuffle')}</button>
            </div>
            <div style="display:flex;align-items:center;justify-content:center;gap:8px">
              <button onclick="setState({audioPlayer:{...appState.audioPlayer,isMuted:!appState.audioPlayer.isMuted}})" style="background:none;border:none;color:var(--gray-dark);cursor:pointer;padding:4px">${ap.isMuted ? icon('volumeX') : icon('volume')}</button>
              <div style="width:100px;height:3px;background:rgba(255,255,255,0.06);border-radius:2px"><div style="height:100%;width:${ap.isMuted?0:ap.volume}%;background:rgba(255,255,255,0.3);border-radius:2px"></div></div>
            </div>
          </div>
        </div>`;
    }

    // Upload Modal
    function renderUploadModal() {
      if (!appState.showUploadModal) return '';
      const type = appState.uploadType;

      return `
        <div class="overlay-center" onclick="setState({showUploadModal:false})">
          <div style="width:100%;max-width:520px;background:var(--surface-2);border:1px solid var(--border);border-radius:24px;padding:32px;margin:20px" onclick="event.stopPropagation()">
            <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:24px">
              <h2 style="font-size:18px;font-weight:700;color:#fff">Upload ${type === 'video' ? 'Vídeo' : type === 'book' ? 'Livro' : 'Áudio'}</h2>
              <button class="btn-icon" onclick="setState({showUploadModal:false})">${icon('x')}</button>
            </div>

            <!-- Cloudinary Upload -->
            <div class="upload-area" id="uploadArea" ondragover="this.classList.add('dragover')" ondragleave="this.classList.remove('dragover')" ondrop="handleFileDrop(event)" onclick="document.getElementById('fileInput').click()">
              ${icon(type === 'video' ? 'cloud' : 'image')}
              <p style="font-size:14px;font-weight:500;color:#fff;margin-bottom:4px">Arraste ou clique para selecionar</p>
              <p style="font-size:12px;color:var(--gray-dark)">${type === 'video' ? 'MP4, WebM, MOV' : type === 'book' ? 'PDF, EPUB' : 'MP3, WAV, OGG'}</p>
              <input type="file" id="fileInput" style="display:none" accept="${type==='video'?'video/*':type==='book'?'application/pdf,.epub':'audio/*'}" onchange="handleFileSelect(event)">
            </div>

            <div id="uploadPreview" style="display:none;margin:16px 0">
              <p style="font-size:13px;color:var(--green);display:flex;align-items:center;gap:6px">${icon('check', 16)} Arquivo selecionado: <strong id="fileName" style="color:#fff"></strong></p>
            </div>

            <!-- Cloudinary Button -->
            <button class="cloudinary-upload-btn" style="width:100%;justify-content:center;margin-bottom:16px" onclick="openCloudinaryUpload()">
              ☁️ Upload via Cloudinary
            </button>

            <div class="form-group">
              <label>Título</label>
              <input type="text" id="uploadTitle" placeholder="Título do conteúdo">
            </div>
            <div class="form-group">
              <label>Autor / Canal</label>
              <input type="text" id="uploadAuthor" placeholder="Nome do autor">
            </div>
            <div class="form-group">
              <label>Categoria</label>
              <input type="text" id="uploadCategory" placeholder="Ex: Elétrica, Automação">
            </div>
            ${type === 'video' || type === 'audio' ? `
              <div class="form-group">
                <label>Duração</label>
                <input type="text" id="uploadDuration" placeholder="Ex: 24:15">
              </div>
            ` : ''}
            ${type === 'book' ? `
              <div class="form-group">
                <label>Número de Páginas</label>
                <input type="text" id="uploadPages" placeholder="Ex: 324">
              </div>
            ` : ''}
            <div style="display:flex;gap:8px;margin-top:20px">
              <button class="btn-primary" style="flex:1;padding:12px;border-radius:12px;font-size:14px;border:none;cursor:pointer" onclick="submitUpload()">Publicar</button>
              <button class="btn-secondary" style="padding:12px 20px;border-radius:12px;font-size:14px" onclick="setState({showUploadModal:false})">Cancelar</button>
            </div>
          </div>
        </div>`;
    }

    // Playlist Modal
    function renderPlaylistModal() {
      if (!appState.showPlaylistModal) return '';
      return `
        <div class="overlay-center" onclick="setState({showPlaylistModal:false})">
          <div style="width:100%;max-width:420px;background:var(--surface-2);border:1px solid var(--border);border-radius:24px;padding:32px;margin:20px" onclick="event.stopPropagation()">
            <h2 style="font-size:18px;font-weight:700;color:#fff;margin-bottom:20px">Nova Playlist</h2>
            <div class="form-group">
              <label>Nome da Playlist</label>
              <input type="text" id="playlistName" placeholder="Ex: Elétrica Básica">
            </div>
            <div style="display:flex;gap:8px;margin-top:20px">
              <button class="btn-primary" style="flex:1;padding:12px;border-radius:12px;font-size:14px;border:none;cursor:pointer" onclick="createPlaylist()">Criar</button>
              <button class="btn-secondary" style="padding:12px 20px;border-radius:12px;font-size:14px" onclick="setState({showPlaylistModal:false})">Cancelar</button>
            </div>
          </div>
        </div>`;
    }

    // Main render
    function render() {
      const app = document.getElementById('app');

      if (appState.selectedItem) {
        if (appState.activeItemType === 'video') {
          app.innerHTML = renderHeader() + renderVideoPlayer();
        } else if (appState.activeItemType === 'book') {
          app.innerHTML = renderBookReader();
        } else {
          app.innerHTML = renderAudioPlayer();
        }
      } else {
        const offset = appState.sidebarOpen ? (window.innerWidth >= 1024 ? 256 : 0) : 0;
        app.innerHTML = `
          <div class="ambient-bg"></div>
          ${renderSidebar()}
          ${renderHeader()}
          ${renderUploadModal()}
          ${renderPlaylistModal()}
          <main class="page-content" style="margin-left:${offset}px;transition:margin-left 0.3s">
            ${renderPage()}
          </main>`;
      }

      // Video timer
      if (appState.selectedItem && appState.activeItemType === 'video' && appState.videoPlayer.isPlaying) {
        if (!window._videoTimer) {
          window._videoTimer = setInterval(() => {
            if (appState.selectedItem && appState.activeItemType === 'video' && appState.videoPlayer.isPlaying) {
              appState.videoPlayer.currentTime = Math.min(appState.videoPlayer.currentTime + 1, 1455);
              render();
            }
          }, 1000);
        }
      } else if (!appState.selectedItem || appState.activeItemType !== 'video') {
        clearInterval(window._videoTimer);
        window._videoTimer = null;
      }

      // Audio timer
      if (appState.selectedItem && appState.activeItemType === 'audio' && appState.audioPlayer.isPlaying) {
        if (!window._audioTimer) {
          window._audioTimer = setInterval(() => {
            if (appState.selectedItem && appState.activeItemType === 'audio' && appState.audioPlayer.isPlaying) {
              appState.audioPlayer.currentTime = Math.min(appState.audioPlayer.currentTime + 1, 2538);
              render();
            }
          }, 1000);
        }
      } else if (!appState.selectedItem || appState.activeItemType !== 'audio') {
        clearInterval(window._audioTimer);
        window._audioTimer = null;
      }
    }

    function renderPage() {
      switch(appState.currentPage) {
        case 'home': return renderHomePage();
        case 'videos': return renderVideosPage();
        case 'books': return renderBooksPage();
        case 'audios': return renderAudiosPage();
        case 'explore': return renderExplorePage();
        case 'favorites': return renderFavoritesPage();
        case 'history': return renderHistoryPage();
        case 'playlists': return renderPlaylistsPage();
        case 'downloads': return renderDownloadsPage();
        case 'settings': return renderSettingsPage();
        case 'admin': return renderAdminPage();
        default: return renderHomePage();
      }
    }

    // ============================================
    // 🎮 EVENT HANDLERS
    // ============================================

    async function loadContentData() {
      try {
        const [videos, books, audios, playlists] = await Promise.all([
          DataService.getVideos(),
          DataService.getBooks(),
          DataService.getAudios(),
          DataService.getPlaylists()
        ]);
        setState({ contentData: { videos, books, audios, playlists } });
      } catch (e) {
        console.error('Erro ao carregar dados:', e);
      }
    }

    // Auth handlers
    function switchAuthTab(tab) {
      document.getElementById('tabLogin').classList.toggle('active', tab === 'login');
      document.getElementById('tabRegister').classList.toggle('active', tab === 'register');
      document.getElementById('loginForm').style.display = tab === 'login' ? 'block' : 'none';
      document.getElementById('registerForm').style.display = tab === 'register' ? 'block' : 'none';
    }

    async function handleLogin() {
      const email = document.getElementById('loginEmail').value.trim();
      const password = document.getElementById('loginPassword').value;
      const errorEl = document.getElementById('loginError');

      if (!email || !password) {
        errorEl.textContent = 'Preencha todos os campos';
        errorEl.classList.add('show');
        return;
      }

      try {
        const user = await AuthService.login(email, password);
        setState({ currentUser: user });
        showToast(`Bem-vindo, ${user.displayName || user.email?.split('@')[0]}!`, 'success');
        await loadContentData();
      } catch (e) {
        errorEl.textContent = e.message;
        errorEl.classList.add('show');
        showToast(e.message, 'error');
      }
    }

    async function handleRegister() {
      const name = document.getElementById('regName').value.trim();
      const email = document.getElementById('regEmail').value.trim();
      const password = document.getElementById('regPassword').value;
      const errorEl = document.getElementById('regError');

      if (!name || !email || !password) {
        errorEl.textContent = 'Preencha todos os campos';
        errorEl.classList.add('show');
        return;
      }
      if (password.length < 6) {
        errorEl.textContent = 'Senha deve ter no mínimo 6 caracteres';
        errorEl.classList.add('show');
        return;
      }

      try {
        const user = await AuthService.register(email, password, name);
        setState({ currentUser: user });
        showToast(`Conta criada com sucesso! Bem-vindo, ${name}!`, 'success');
        await loadContentData();
      } catch (e) {
        errorEl.textContent = e.message;
        errorEl.classList.add('show');
        showToast(e.message, 'error');
      }
    }

    async function handleGoogleLogin() {
      try {
        const user = await AuthService.googleLogin();
        setState({ currentUser: user });
        showToast(`Login com Google realizado!`, 'success');
        await loadContentData();
      } catch (e) {
        showToast(e.message, 'error');
      }
    }

    async function handleLogout() {
      await AuthService.logout();
      setState({ currentUser: null, currentPage: 'home' });
      showToast('Você saiu da conta', 'info');
    }

    // Upload handlers
    function openUploadModal(type) {
      setState({ showUploadModal: true, uploadType: type });
    }

    function openCloudinaryUpload() {
      CloudinaryService.initWidget(
        (result) => {
          // Success
          document.getElementById('fileName').textContent = result.secure_url;
          document.getElementById('uploadPreview').style.display = 'block';
          document.getElementById('uploadTitle').value = result.original_filename || '';
          showToast('Upload concluído no Cloudinary!', 'success');
        },
        (error) => {
          showToast('Erro no upload: ' + error.message, 'error');
        }
      );
      CloudinaryService.open();
    }

    function handleFileSelect(event) {
      const file = event.target.files[0];
      if (file) {
        document.getElementById('fileName').textContent = file.name;
        document.getElementById('uploadPreview').style.display = 'block';
      }
    }

    function handleFileDrop(event) {
      event.preventDefault();
      event.target.closest('.upload-area').classList.remove('dragover');
      const file = event.dataTransfer.files[0];
      if (file) {
        document.getElementById('fileName').textContent = file.name;
        document.getElementById('uploadPreview').style.display = 'block';
      }
    }

    async function submitUpload() {
      const title = document.getElementById('uploadTitle').value.trim();
      const author = document.getElementById('uploadAuthor').value.trim();
      const category = document.getElementById('uploadCategory').value.trim();

      if (!title) {
        showToast('Preencha o título', 'error');
        return;
      }

      const type = appState.uploadType;

      try {
        if (type === 'video') {
          const duration = document.getElementById('uploadDuration')?.value || '';
          const thumbInput = document.getElementById('uploadThumb')?.value || '';
          await DataService.addVideo({
            title, author, category, duration,
            thumbnail: thumbInput || 'https://image.qwenlm.ai/public_source/1b0f8a1c-4cc0-422f-a757-b944a1ccfabe/146f76c36-ff85-4ae7-8431-2be22742b1c0.png'
          });
          showToast('Vídeo publicado com sucesso!', 'success');
        } else if (type === 'book') {
          const pages = document.getElementById('uploadPages')?.value || '0';
          const coverInput = document.getElementById('uploadCover')?.value || '';
          await DataService.addBook({
            title, author, category,
            pages: parseInt(pages) || 0,
            cover: coverInput || 'https://image.qwenlm.ai/public_source/1b0f8a1c-4cc0-422f-a757-b944a1ccfabe/1096348b1-ebaf-4f4c-b2e3-3b08422bd92e.png'
          });
          showToast('Livro publicado com sucesso!', 'success');
        } else if (type === 'audio') {
          const duration = document.getElementById('uploadDuration')?.value || '';
          const coverInput = document.getElementById('uploadAudioCover')?.value || '';
          await DataService.addAudio({
            title, author, category, duration,
            cover: coverInput || 'https://image.qwenlm.ai/public_source/1b0f8a1c-4cc0-422f-a757-b944a1ccfabe/18643490d-1a86-4ed9-abfd-b01ec8f6789f.png'
          });
          showToast('Áudio publicado com sucesso!', 'success');
        }

        setState({ showUploadModal: false });
        await loadContentData();
      } catch (e) {
        showToast('Erro ao publicar: ' + e.message, 'error');
      }
    }

    async function deleteContent(type, id) {
      if (!confirm('Tem certeza que deseja excluir?')) return;
      try {
        if (type === 'video') await DataService.deleteVideo(id);
        else if (type === 'book') await DataService.deleteBook(id);
        else if (type === 'audio') await DataService.deleteAudio(id);
        showToast('Conteúdo excluído', 'success');
        await loadContentData();
      } catch (e) {
        showToast('Erro ao excluir', 'error');
      }
    }

    function showCreatePlaylistModal() {
      setState({ showPlaylistModal: true });
    }

    async function createPlaylist() {
      const name = document.getElementById('playlistName').value.trim();
      if (!name) {
        showToast('Digite o nome da playlist', 'error');
        return;
      }
      await DataService.createPlaylist(name, []);
      setState({ showPlaylistModal: false });
      showToast('Playlist criada!', 'success');
      await loadContentData();
    }

    function handleSearchInput(value) {
      setState({ searchQuery: value });
    }

    // ============================================
    //  INIT
    // ============================================
    const app = document.getElementById('app');
    app.innerHTML = renderLoadingScreen();

    // Auth state listener
    AuthService.onAuthChange(async (user) => {
      setState({ currentUser: user });
      if (user) {
        await loadContentData();
      } else {
        // Load demo data even without auth
        await loadContentData();
      }

      // Hide loading screen
      setTimeout(() => {
        const ls = document.getElementById('loadingScreen');
        if (ls) {
          ls.classList.add('hidden');
          setTimeout(() => { ls.remove(); render(); }, 600);
        }
      }, 1500);
    });

    // Window resize handler for sidebar
    window.addEventListener('resize', () => {
      if (window.innerWidth < 1024 && appState.sidebarOpen) {
        setState({ sidebarOpen: false });
      }
    });
  </script>
</body>
</html>
