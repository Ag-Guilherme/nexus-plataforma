function fmtDate(ds){if(!ds)return'Sem limite';var d=new Date(ds);if(isNaN(d.getTime()))return ds;return d.toLocaleDateString('pt-BR');}
function daysRemaining(ds){if(!ds)return 999999;var now=new Date();now.setHours(0,0,0,0);var exp=new Date(ds);exp.setHours(0,0,0,0);return Math.ceil((exp-now)/(1000*60*60*24));}
function timeRemaining(ds){
  if(!ds)return{text:'Acesso ilimitado',color:'#10b981',expired:false};
  var days=daysRemaining(ds);
  if(days<0)return{text:'Expirado',color:'#ef4444',expired:true};
  if(days===0)return{text:'Expira hoje',color:'#f59e0b',expired:false};
  if(days<=7)return{text:days+' dias restantes',color:'#ef4444',expired:false};
  if(days<=30)return{text:days+' dias restantes',color:'#f59e0b',expired:false};
  var months=Math.floor(days/30);var rem=days%30;
  var txt=months+' mes'+(months>1?'es':'');
  if(rem>0)txt+=' e '+rem+' dia'+(rem>1?'s':'');
  txt+=' restantes';
  return{text:txt,color:'#10b981',expired:false};
}
function calcEnrollUntil(userId,courseId){
  var course=null,i;for(i=0;i<COURSES.length;i++){if(COURSES[i].id===courseId){course=COURSES[i];break;}}
  if(!course)return null;
  var today=new Date();today.setHours(0,0,0,0);
  var key=userId+'_'+courseId;
  if(ENROLLMENTS[key]&&ENROLLMENTS[key].expires){
    var expFromEnroll=new Date(ENROLLMENTS[key].expires);expFromEnroll.setHours(0,0,0,0);
    if(course.expDate){var expD=new Date(course.expDate);expD.setHours(0,0,0,0);return fmtDate(expD<expFromEnroll?expD:expFromEnroll);}
    return fmtDate(expFromEnroll);
  }
  if(ENROLLMENTS[key]&&course.maxDur>0){
    var enrolledDate=new Date(ENROLLMENTS[key].enrolled);
    var until=new Date(enrolledDate.getTime()+course.maxDur*24*60*60*1000);until.setHours(0,0,0,0);
    if(course.expDate){var expD=new Date(course.expDate);expD.setHours(0,0,0,0);return fmtDate(expD<until?expD:until);}
    return fmtDate(until);
  }
  if(course.expDate)return fmtDate(course.expDate);
  if(course.maxDur>0){var d=new Date(today.getTime()+course.maxDur*24*60*60*1000);return fmtDate(d);}
  return null;
}
function isCourseExpired(userId,courseId){
  if(!userId||!courseId)return false;
  var until=calcEnrollUntil(userId,courseId);
  if(!until||until==='Sem limite')return false;
  return daysRemaining(until)<0;
}
function enrollUser(userId,courseId,dur){
  var today=new Date();today.setHours(0,0,0,0);
  var key=userId+'_'+courseId;
  var until=new Date(today.getTime()+(dur||0)*24*60*60*1000);
  ENROLLMENTS[key]={enrolled:today.toISOString(),duration:dur||0,expires:until.toISOString()};
  ld5();
}

function doRenewEnroll(uid,cid,dur){
  var key=uid+'_'+cid;
  if(!ENROLLMENTS[key]){toast('Usuario nao inscrito','er');return;}
  var durNum=parseInt(dur);if(!durNum||durNum<1){toast('Duracao invalida','er');return;}
  var today=new Date();today.setHours(0,0,0,0);
  var currentExp=ENROLLMENTS[key].expires?new Date(ENROLLMENTS[key].expires):today;
  if(currentExp<today)currentExp=today;
  var newExp=new Date(currentExp.getTime()+durNum*24*60*60*1000);
  ENROLLMENTS[key].enrolled=today.toISOString();
  ENROLLMENTS[key].duration=durNum;
  ENROLLMENTS[key].expires=newExp.toISOString();
  ld5();toast('Renovado por '+durNum+' dias!','ok');showPage();
}
function doRemoveEnroll(uid,cid){
  var key=uid+'_'+cid;
  if(ENROLLMENTS[key]){delete ENROLLMENTS[key];ld5();}
