function toast(m,t){
  t=t||'in';
  var c=document.querySelector('.tc');
  if(!c){c=document.createElement('div');c.className='tc';document.body.appendChild(c);}
  var e=document.createElement('div');
  e.className='toast t'+(t==='ok'?'1':t==='er'?'2':'3');
  e.textContent=m;
  c.appendChild(e);
  setTimeout(function(){e.style.opacity='0';e.style.transition='opacity .3s';setTimeout(function(){if(e.parentNode)e.parentNode.removeChild(e);},300);},3000);
}
