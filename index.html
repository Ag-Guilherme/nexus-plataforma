<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NEXUS</title>

<link href="https://cdn.jsdelivr.net/npm/@fontsource/inter@5.0.18/500.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/@fontsource/inter@5.0.18/600.css" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#08080e;--bg2:#0f0f18;--bg3:#141420;--border:#1e1e30;--border2:#2a2a3e;--text:#e8e8f0;--text2:#aaa;--text3:#555;--text4:#444;--primary:#00b4ff;--secondary:#8b5cf6;--gold:#f59e0b;--green:#10b981;--red:#ef4444;--cyan:#06b6d4}
body{background:var(--bg);color:var(--text);font-family:'Inter',sans-serif;min-height:100vh}
.login-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;background:radial-gradient(ellipse at top,#0f0f28 0%,var(--bg) 70%)}
.login-card{width:100%;max-width:400px;background:var(--bg2);border:1px solid var(--border);border-radius:24px;padding:36px;position:relative;overflow:hidden}
.login-logo{text-align:center;margin-bottom:28px;position:relative;z-index:1}
.login-logo .icon{width:64px;height:64px;border-radius:18px;background:linear-gradient(135deg,var(--primary),var(--secondary));display:flex;align-items:center;justify-content:center;margin:0 auto 14px;color:#fff;font-size:26px;font-weight:800;box-shadow:0 8px 32px rgba(0,180,255,.2);overflow:hidden}
.login-logo .icon img{width:100%;height:100%;object-fit:cover;border-radius:18px}
.login-logo h1{font-size:26px;font-weight:800;background:linear-gradient(135deg,#fff,var(--primary));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.login-logo p{font-size:11px;color:var(--text3);margin-top:6px}
.fg{margin-bottom:14px}
.fg label{display:block;font-size:11px;color:var(--text3);margin-bottom:5px;font-weight:500}
.fg input,.fg select,.fg textarea{background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:10px 14px;color:#fff;font-size:13px;outline:none;width:100%;font-family:inherit;transition:border-color .2s}
.fg input:focus,.fg select:focus,.fg textarea:focus{border-color:var(--primary)}
.fg textarea{resize:vertical;min-height:60px}
.btn{padding:10px 16px;border-radius:10px;font-size:13px;font-weight:600;border:none;cursor:pointer;display:inline-flex;align-items:center;gap:6px;text-decoration:none;transition:all .2s}
.btn1{background:var(--primary);color:#000}.btn1:hover{filter:brightness(1.1);transform:translateY(-1px)}
.btn2{background:var(--secondary);color:#fff}.btn2:hover{filter:brightness(1.1);transform:translateY(-1px)}
.btn3{background:var(--bg3);color:var(--text);border:1px solid var(--border2)}.btn3:hover{background:var(--border);transform:translateY(-1px)}
.btn4{background:rgba(239,68,68,.15);color:var(--red);border:1px solid rgba(239,68,68,.2)}
.btn-gold{background:linear-gradient(135deg,var(--gold),#d97706);color:#fff}
.btn-sm{padding:5px 10px;font-size:11px;border-radius:6px}
.bi{width:36px;height:36px;border-radius:8px;border:none;background:transparent;color:var(--text3);cursor:pointer;display:inline-flex;align-items:center;justify-content:center;transition:all .15s}
.bi:hover{background:var(--bg3);color:#fff}
.sidebar{position:fixed;left:0;top:0;bottom:0;width:240px;background:#0a0a14;border-right:1px solid var(--border);z-index:50;overflow-y:auto;transition:width .3s}
.sidebar.shut{width:64px}.sidebar.shut .ntxt{display:none}
.side-head{padding:14px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px;height:56px}
.side-head .logo{width:34px;height:34px;border-radius:10px;background:linear-gradient(135deg,var(--primary),var(--secondary));display:flex;align-items:center;justify-content:center;flex-shrink:0;font-weight:800;color:#fff;font-size:16px}
.side-head h2{font-size:14px;font-weight:800;color:#fff;white-space:nowrap}
.side-head span{font-size:8px;color:var(--text3);text-transform:uppercase;display:block}
.side-nav{flex:1;padding:10px 8px;display:flex;flex-direction:column;gap:2px}
.nav-i{display:flex;align-items:center;gap:10px;padding:9px 12px;border-radius:8px;color:var(--text3);font-size:12px;font-weight:500;cursor:pointer;border:none;background:none;width:100%;text-align:left;transition:all .15s}
.nav-i:hover{background:var(--bg3);color:var(--text2)}
.nav-i.act{background:rgba(0,180,255,.08);color:var(--primary);border:1px solid rgba(0,180,255,.15)}
.side-foot{padding:10px 16px;border-top:1px solid var(--border)}
.adm-user{display:flex;align-items:center;gap:8px;padding:8px;border-radius:8px;background:var(--bg3)}
.adm-user .ava{width:30px;height:30px;border-radius:8px;background:linear-gradient(135deg,var(--primary),var(--secondary));display:flex;align-items:center;justify-content:center;font-weight:700;font-size:11px;flex-shrink:0}
.adm-user .info{flex:1;min-width:0}.adm-user .info .nm{font-size:11px;font-weight:600;color:#fff;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.adm-user .info .rl{font-size:8px;color:var(--text3);text-transform:uppercase}
.main{margin-left:240px;min-height:100vh;transition:margin-left .3s}.main.exp{margin-left:64px}
.hdr{position:fixed;top:0;left:240px;right:0;height:56px;background:rgba(10,10,18,.92);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);z-index:40;display:flex;align-items:center;padding:0 16px;gap:10px;transition:left .3s}
.hdr.exp{left:64px}
.hdr .srch{flex:1;max-width:460px;position:relative}
.hdr .srch input{background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:8px 12px 8px 34px;color:#fff;font-size:12px;outline:none;width:100%;transition:border-color .2s}
.hdr .srch input:focus{border-color:var(--primary)}
.hdr .acts{display:flex;align-items:center;gap:4px;margin-left:auto}
.pg{padding:56px 20px 32px 20px}
.card{background:var(--bg3);border:1px solid var(--border);border-radius:14px;overflow:hidden;cursor:pointer;transition:all .3s}
.card:hover{border-color:rgba(0,180,255,.2);transform:translateY(-3px)}
.card.premium{border-color:rgba(245,158,11,.3)}.card.premium:hover{border-color:rgba(245,158,11,.5)}
.card.expired{border-color:rgba(239,68,68,.3);opacity:.6}.card.expired:hover{transform:none}
.stat{background:var(--bg3);border:1px solid var(--border);border-radius:14px;padding:18px;cursor:pointer;transition:all .2s}.stat:hover{border-color:rgba(0,180,255,.2);transform:translateY(-2px)}
.stat .icon{width:36px;height:36px;border-radius:9px;display:flex;align-items:center;justify-content:center;margin-bottom:10px}
.stat .val{font-size:22px;font-weight:800;color:#fff}.stat .lbl{font-size:10px;color:var(--text3);margin-top:2px}
.badge{display:inline-block;padding:2px 8px;border-radius:999px;font-size:9px;font-weight:700}
.b1{background:rgba(0,180,255,.1);color:var(--primary)}.b2{background:rgba(139,92,246,.1);color:var(--secondary)}.b3{background:rgba(16,185,129,.1);color:var(--green)}
.b4{background:rgba(245,158,11,.1);color:var(--gold)}.b5{background:rgba(239,68,68,.1);color:var(--red)}
.premium-badge{background:linear-gradient(135deg,rgba(245,158,11,.2),rgba(217,119,6,.2));color:var(--gold);border:1px solid rgba(245,158,11,.3)}
.cc{display:inline-flex;align-items:center;gap:4px;padding:3px 10px;border-radius:999px;font-size:9px;font-weight:700;background:rgba(139,92,246,.12);color:var(--secondary)}
.flt{padding:6px 14px;border-radius:8px;font-size:12px;font-weight:500;border:1px solid var(--border);background:var(--bg3);color:var(--text3);cursor:pointer;white-space:nowrap;transition:all .15s}
.flt:hover{background:var(--border);color:var(--text2)}.flt.on{background:var(--primary);color:#000;border-color:var(--primary);font-weight:700}.flt.on2{background:var(--secondary);color:#fff;border-color:var(--secondary);font-weight:700}
.li{display:flex;align-items:center;gap:12px;padding:10px;border-radius:10px;background:rgba(20,20,32,.8);border:1px solid var(--border);cursor:pointer;transition:all .15s}.li:hover{background:var(--border)}
.sr{display:flex;gap:14px;overflow-x:auto;padding-bottom:8px}.sr::-webkit-scrollbar{display:none}
.ga{display:grid;grid-template-columns:repeat(auto-fill,minmax(230px,1fr));gap:14px}
.ov{position:fixed;inset:0;background:rgba(0,0,0,.85);backdrop-filter:blur(8px);z-index:60;display:flex;align-items:center;justify-content:center;padding:20px}
.md{width:100%;max-width:560px;background:var(--bg2);border:1px solid var(--border);border-radius:18px;overflow:hidden;display:flex;flex-direction:column;max-height:85vh}
.md-head{padding:16px 22px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.md-head h3{font-size:15px;font-weight:700;color:#fff}
.md-body{padding:22px;overflow-y:auto;flex:1}
.md-foot{padding:14px 22px;border-top:1px solid var(--border);display:flex;justify-content:flex-end;gap:8px}
.tc{position:fixed;top:66px;right:16px;z-index:80;display:flex;flex-direction:column;gap:6px}
.toast{padding:10px 16px;border-radius:8px;font-size:12px;font-weight:500;animation:ti .3s;min-width:260px}
.t1{background:rgba(16,185,129,.15);border:1px solid rgba(16,185,129,.3);color:var(--green)}
.t2{background:rgba(239,68,68,.15);border:1px solid rgba(239,68,68,.3);color:var(--red)}
.t3{background:rgba(0,180,255,.15);border:1px solid rgba(0,180,255,.3);color:var(--primary)}
@keyframes ti{from{transform:translateX(120%);opacity:0}to{transform:translateX(0);opacity:1}}
.pb{height:4px;background:var(--border);border-radius:2px;overflow:hidden}.pf{height:100%;background:linear-gradient(90deg,var(--primary),var(--secondary));border-radius:2px}
.qo{padding:12px 14px;border-radius:8px;border:1px solid var(--border);background:rgba(20,20,32,.4);cursor:pointer;margin-bottom:5px;display:flex;align-items:center;gap:10px;font-size:13px}
.qo:hover{background:var(--border)}.qo.s{border-color:var(--primary);background:rgba(0,180,255,.08)}
.ql{width:24px;height:24px;border-radius:6px;background:var(--border);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:11px;flex-shrink:0}
.sp{width:40px;height:40px;border:2px solid transparent;border-top-color:var(--primary);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.fa{animation:fu .35s ease-out}@keyframes fu{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
.panel{background:var(--bg3);border:1px solid var(--border);border-radius:14px;padding:20px;margin-bottom:16px}
.panel h3{font-size:14px;font-weight:600;color:#fff;margin-bottom:12px;display:flex;align-items:center;gap:6px}
.tw{background:var(--bg3);border:1px solid var(--border);border-radius:14px;overflow:hidden}
table{width:100%;border-collapse:collapse}
th{text-align:left;padding:10px 16px;font-size:10px;color:var(--text3);text-transform:uppercase;border-bottom:1px solid var(--border);font-weight:600}
td{padding:10px 16px;font-size:12px;color:var(--text2);border-bottom:1px solid var(--bg2)}
.le{display:flex;align-items:center;gap:10px;padding:10px 16px;border-bottom:1px solid var(--bg2)}
.le .dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.le .dot.s{background:var(--green)}.le .dot.i{background:var(--primary)}.le .dot.d{background:var(--red)}
.le .txt{flex:1;font-size:12px;color:var(--text2)}.le .tm{font-size:10px;color:var(--text4)}
.empty{text-align:center;padding:50px 20px;color:var(--text4)}.empty h3{font-size:15px;color:var(--text3);margin-bottom:4px}
.pf2{width:100%;border-radius:12px;border:1px solid var(--border);overflow:hidden;margin-bottom:16px;position:relative;background:#000}
.pf2 iframe{width:100%;aspect-ratio:16/9;border:none}
.pf2 .yt-info{position:absolute;top:8px;right:8px;background:rgba(239,68,68,.85);color:#fff;font-size:9px;padding:2px 8px;border-radius:4px;font-weight:700;z-index:5}
.pf2 .gd-info{position:absolute;top:8px;right:8px;background:rgba(245,158,11,.85);color:#fff;font-size:9px;padding:2px 8px;border-radius:4px;font-weight:700;z-index:5}
.ro{position:absolute;inset:0;z-index:10;background:transparent}
.rw{position:absolute;bottom:8px;right:8px;z-index:11;background:rgba(0,0,0,.5);color:rgba(255,255,255,.3);font-size:8px;padding:2px 6px;border-radius:4px;font-weight:600;pointer-events:none}
.gf{width:100%;border-radius:12px;border:1px solid var(--border);overflow:hidden;margin-bottom:16px}.gf iframe{width:100%;height:700px;border:none;border-radius:12px}
.sb{background:var(--bg2);border-radius:10px;padding:14px;border:1px solid var(--border);margin-bottom:16px}
.sb h4{font-size:12px;font-weight:600;color:#fff;margin-bottom:8px}.sb p{font-size:11px;color:var(--text2);line-height:1.7}
.se{background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:10px;margin-top:8px;font-size:10px;color:var(--primary);font-family:monospace;word-break:break-all}
.ab{display:flex;gap:4px}
.ct{width:100%;border-radius:12px;border:1px solid var(--border);overflow:hidden;margin-bottom:16px}.ct iframe{width:100%;aspect-ratio:16/9;border:none}
.lo{position:fixed;inset:0;background:rgba(0,0,0,.9);z-index:100;display:flex;align-items:center;justify-content:center;padding:20px}
.lc{width:100%;max-width:440px;background:var(--bg2);border:1px solid var(--border);border-radius:20px;padding:32px;text-align:center}
.lc .li2{width:60px;height:60px;border-radius:16px;display:flex;align-items:center;justify-content:center;margin:0 auto 16px;font-size:24px}
.lc .li2.gold{background:linear-gradient(135deg,rgba(245,158,11,.15),rgba(217,119,6,.15));color:var(--gold)}
.lc .li2.red{background:rgba(239,68,68,.15);color:var(--red)}
.ts{width:40px;height:22px;border-radius:11px;background:var(--border);cursor:pointer;position:relative;transition:all .2s;flex-shrink:0}
.ts.on{background:var(--primary)}.ts.on::after{left:21px}
.ts::after{content:'';width:16px;height:16px;border-radius:50%;background:#fff;position:absolute;top:3px;left:3px;transition:all .2s}
.mt{display:flex;gap:2px;margin-bottom:16px;background:var(--bg3);border-radius:8px;padding:2px}
.mt button{flex:1;padding:8px;text-align:center;border-radius:6px;font-size:12px;font-weight:500;color:var(--text3);cursor:pointer;border:none;background:none;transition:all .15s}
.mt button.on{background:var(--primary);color:#000;font-weight:600}
.qs{display:flex;gap:8px;margin-bottom:14px}
.qo2{flex:1;padding:12px;border-radius:10px;border:1px solid var(--border);background:var(--bg2);cursor:pointer;text-align:center;transition:all .15s}
.qo2:hover{border-color:rgba(139,92,246,.3)}.qo2.on{border-color:var(--secondary);background:rgba(139,92,246,.08)}
.sr2{display:flex;align-items:center;gap:8px;padding:10px;border-radius:8px;background:var(--bg3);border:1px solid var(--border);margin-bottom:6px}
.ld{position:fixed;inset:0;background:#000;z-index:9999;display:flex;flex-direction:column;align-items:center;justify-content:center;transition:opacity .5s}
.crown{color:var(--gold);font-size:14px}
.link-row{display:flex;gap:8px;margin-top:8px;flex-wrap:wrap}
.link-row a{text-decoration:none}
.help-box{background:rgba(245,158,11,.05);border:1px solid rgba(245,158,11,.15);border-radius:8px;padding:12px;margin-top:12px}
.help-box p{font-size:11px;color:var(--gold);margin:4px 0}
.timer-box{background:rgba(245,158,11,.05);border:1px solid rgba(245,158,11,.15);border-radius:10px;padding:12px;margin:12px 0;text-align:center}
.timer-box .val{font-size:22px;font-weight:800;color:var(--gold)}
.timer-box .lbl{font-size:10px;color:var(--text3)}
.timer-box.expired{background:rgba(239,68,68,.05);border-color:rgba(239,68,68,.15)}
.timer-box.expired .val{color:var(--red)}
.erow{display:flex;align-items:center;gap:10px;padding:10px;border-radius:8px;background:var(--bg2);border:1px solid var(--border);margin-bottom:6px}
.erow .uname{flex:1;font-size:12px;font-weight:600;color:#fff}
.erow .udetail{font-size:10px;color:var(--text3)}
.src-select{display:grid;grid-template-columns:repeat(auto-fill,minmax(100px,1fr));gap:6px;margin-bottom:14px}
.src-btn{padding:10px 8px;border-radius:8px;border:1px solid var(--border);background:var(--bg3);cursor:pointer;text-align:center;transition:all .15s}
.src-btn:hover{border-color:rgba(0,180,255,.3)}.src-btn.on{border-color:var(--primary);background:rgba(0,180,255,.08)}
.src-btn .ico{font-size:20px;margin-bottom:4px}.src-btn .lbl{font-size:10px;font-weight:600;color:#fff}
.calendar-wrap{background:var(--bg3);border:1px solid var(--border);border-radius:14px;padding:16px;margin-bottom:16px}
.cal-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.cal-header h3{font-size:13px;font-weight:600;color:#fff}
.cal-nav{display:flex;gap:4px}
.cal-nav button{width:28px;height:28px;border-radius:6px;border:1px solid var(--border);background:var(--bg3);color:var(--text3);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s}
.cal-nav button:hover{background:var(--border);color:#fff}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:2px}
.cal-dh{text-align:center;font-size:9px;color:var(--text3);padding:4px;font-weight:600;text-transform:uppercase}
.cal-d{text-align:center;padding:6px 2px;border-radius:6px;font-size:11px;color:var(--text3);position:relative;min-height:28px;display:flex;align-items:center;justify-content:center}
.cal-d.empty{color:transparent}.cal-d.today{border:1px solid var(--primary);color:#fff}
.cal-d.active{background:rgba(0,180,255,.15);color:var(--primary)}
.cal-d.active.today{background:var(--primary);color:#000}
.cal-legend{display:flex;gap:12px;margin-top:10px;font-size:10px;color:var(--text3)}
.cal-legend span{display:flex;align-items:center;gap:4px}
.cal-legend .dot{width:10px;height:10px;border-radius:3px}
.p-logo{width:64px;height:64px;border-radius:18px;background:linear-gradient(135deg,var(--primary),var(--secondary));display:flex;align-items:center;justify-content:center;margin:0 auto 12px;font-weight:800;color:#fff;font-size:28px}
@media(max-width:1023px){.sidebar{transform:translateX(-100%);width:240px!important}.sidebar.open{transform:translateX(0)}.main{margin-left:0!important}.hdr{left:0!important}.mbg{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:45;display:none}.mbg.show{display:block}}
@media(max-width:767px){.pg{padding:56px 12px 24px}.ga{grid-template-columns:1fr}.gf iframe{height:500px}.src-select{grid-template-columns:repeat(3,1fr)}}
</style>
</head>
<body>
<div class="ld" id="loader"><div class="sp"></div><p style="margin-top:16px;color:var(--text3);font-size:12px" id="loaderText">Carregando...</p></div>
<div id="app"></div>
<script>
var S,ADMIN,CATEGORIES,ADMIN_BTN,USER_BTN,MEDIA,VIDEOS,BOOKS,AUDIOS,COURSES,QUIZ,LOGS,USERS,ENROLLMENTS,PLATFORM;
function init(){
ADMIN={id:'admin',nm:'Administrador',em:'admin',pw:'admin',r:'admin'};
PLATFORM=JSON.parse(localStorage.getItem('nx_p')||'null')||{name:'NEXUS',tagline:'Plataforma de Conteudo',primaryColor:'#00b4ff',secondaryColor:'#8b5cf6',logo:'N',logoImg:''};
applyTheme();
CATEGORIES=JSON.parse(localStorage.getItem('nx_c')||'null')||['Eletrica','Automacao','Eletronica','Energia','Seguranca'];
ADMIN_BTN=JSON.parse(localStorage.getItem('nx_ab')||'null')||[
{id:'dash',label:'Dashboard',icon:'chart',pg:'dash',a:true},
{id:'add',label:'Adicionar',icon:'up',pg:'add',a:true},
{id:'mg',label:'Gerenciar',icon:'lst',pg:'mg',a:true},
{id:'co',label:'Cursos',icon:'grd',pg:'co',a:true},
{id:'us',label:'Usuarios',icon:'usr',pg:'us',a:true},
{id:'ca',label:'Categorias',icon:'cat',pg:'ca',a:true},
{id:'lo',label:'Logs',icon:'comp',pg:'lo',a:true},
{id:'la',label:'Layout',icon:'layout',pg:'la',a:true},
{id:'pl',label:'Plataforma',icon:'set',pg:'pl',a:true}
];
USER_BTN=JSON.parse(localStorage.getItem('nx_ub')||'null')||[
{id:'ho',label:'Inicio',icon:'home',pg:'ho',a:true},
{id:'vi',label:'Videos',icon:'video',pg:'vi',a:true},
{id:'bo',label:'Livros',icon:'book',pg:'bo',a:true},

}

function getStreakLabel(activities){if(!activities.length)return'Sem atividade ainda';var sorted=activities.slice().sort().reverse();var streak=1;for(var i=1;i<sorted.length;i++){var prev=new Date(sorted[i-1]);var curr=new Date(sorted[i]);var diff=Math.round((prev-curr)/(1000*60*60*24));if(diff===1)streak++;else break;}return streak+(streak>1?' dias seguidos':' dia ativo');}
function calPrev(){S.calMonth--;if(S.calMonth<0){S.calMonth=11;S.calYear--;}showPage();}
function calNext(){S.calMonth++;if(S.calMonth>11){S.calMonth=0;S.calYear++;}showPage();}
function timeRemaining(ds){
if(!ds)return{text:'Acesso ilimitado',color:'#10b981',expired:false};
var days=daysRemaining(ds);
if(days<0)return{text:'Expirado',color:'#ef4444',expired:true};
if(days===0)return{text:'Expira hoje',color:'#f59e0b',expired:false};
if(days<=7)return{text:days+' dias restantes',color:'#ef4444',expired:false};
if(days<=30)return{text:days+' dias restantes',color:'#f59e0b',expired:false};
var months=Math.floor(days/30);var rem=days%30;var txt=months+' mes'+(months>1?'es':'');if(rem>0)txt+=' e '+rem+' dia'+(rem>1?'s':'');txt+=' restantes';
return{text:txt,color:'#10b981',expired:false};
}
