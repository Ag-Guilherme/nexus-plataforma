<script>
const ADMIN={id:'admin',nm:'Administrador',em:'admin@admin',pw:'Admin',r:'admin'};
let USERS=JSON.parse(localStorage.getItem('nx_users_v2')||'[]');
let S={user:JSON.parse(localStorage.getItem('nx_me_v2')||'null'),at:'user',pg:'home',sb:true,sq:'',it:null,itp:null,fl:{v:'Todos',b:'Todos',a:'Todos'},vc:null,sq2:false,qi:null,qzIdx:0,qx:0,qa:[],qd:false,stm:false,stt:'',sau:false,su:false,ut:'video',utSrc:'yt',scf:false,sal:false,salc:'',saq:false,saqc:'',sqType:'internal',editItem:null,editType:'',vp:{p:false,t:0,v:80,m:false,liked:false},bp:{p:0,z:1},ap:{p:false,t:0,v:80,m:false,liked:false},mgTab:'video',mgSrch:'',mgCat:'all',usrSrch:'',showChangePass:false,changeTarget:null,changeTargetNm:''};
function setState(u){Object.assign(S,u);render();}
function go(p){setState({pg:p,vc:null});window.scrollTo(0,0);}
function toggleSb(){setState({sb:!S.sb});}
function clickIt(item){setState({it:item,itp:item.type||'video'});}
function goBack(){setState({it:null,itp:null});}
function fmtT(s){const m=Math.floor(s/60);return m+':'+Math.floor(s%60).toString().padStart(2,'0');}
function toast(m,t='in'){let c=document.querySelector('.tc');if(!c){c=document.createElement('div');c.className='tc';document.body.appendChild(c);}const e=document.createElement('div');e.className='toast toast-'+t;e.textContent=m;c.appendChild(e);setTimeout(()=>{e.style.opacity='0';e.style.transition='opacity .3s';setTimeout(()=>e.remove(),300);},3000);}

// AUTH
function doLogin(){
  const e=document.getElementById('le'),p=document.getElementById('lp');if(!e||!p)return;
  const ev=e.value.trim(),pv=p.value;
  if(ev===ADMIN.em&&pv===ADMIN.pw){S.user={...ADMIN};localStorage.setItem('nx_me_v2',JSON.stringify(S.user));addLog('s','Admin fez login');toast('Bem-vindo!','ok');render();return;}
  const u=USERS.find(x=>x.em===ev&&x.pw===pv);
  if(!u){toast('Email ou senha incorretos','er');render();return;}
  S.user=u;localStorage.setItem('nx_me_v2',JSON.stringify(u));addLog('s',u.nm+' fez login');toast('Bem-vindo!','ok');render();
}
function doLogout(){addLog('i',S.user?.nm+' saiu');S.user=null;localStorage.removeItem('nx_me_v2');S.pg='home';toast('Saiu','in');render();}

// CHANGE PASSWORD
function openChangePass(target,targetNm){setState({showChangePass:true,changeTarget:target,changeTargetNm:targetNm});}
function submitChangePass(){
  const old=document.getElementById('cpOld')?.value,nw=document.getElementById('cpNew')?.value,conf=document.getElementById('cpConfirm')?.value;
  if(!old||!nw||!conf){toast('Preencha todos os campos','er');return;}
  if(nw.length<6){toast('Mínimo 6 caracteres','er');return;}
  if(nw!==conf){toast('Senhas não coincidem','er');return;}
  if(S.changeTarget==='admin'){
    if(old!==ADMIN.pw){toast('Senha atual incorreta','er');return;}
    ADMIN.pw=nw;addLog('w','Admin alterou sua senha');toast('Senha alterada!','ok');
  }else{
    const u=USERS.find(x=>x.id===S.changeTarget);if(!u){toast('Usuário não encontrado','er');return;}
    if(old!==u.pw){toast('Senha atual incorreta','er');return;}
    u.pw=nw;localStorage.setItem('nx_users_v2',JSON.stringify(USERS));addLog('w','Senha alterada: '+S.changeTargetNm);toast('Senha de '+S.changeTargetNm+' alterada!','ok');
  }
  setState({showChangePass:false,changeTarget:null,changeTargetNm:''});
}

// URL HELPERS
function extractYTId(url){if(!url)return'';let m=url.match(/(?:youtu\.be\/|youtube\.com(?:\/embed\/|\/v\/|\/watch\?v=|\/watch\?.+&v=))([\w-]{11})/);if(m)return m[1];m=url.match(/youtube\.com\/shorts\/([\w-]{11})/);if(m)return m[1];return'';}
function getYTThumb(ytId){return ytId?`https://img.youtube.com/vi/${ytId}/hqdefault.jpg`:'';}
function getYTEmbedUrl(url){const id=extractYTId(url);return id?`https://www.youtube.com/embed/${id}?rel=0&modestbranding=1&controls=1&disablekb=1`:'';}
function extractGDriveId(url){if(!url)return'';let m=url.match(/\/d\/([a-zA-Z0-9_-]+)/);if(m)return m[1];m=url.match(/id=([a-zA-Z0-9_-]+)/);if(m)return m[1];return'';}
function getGDPreviewUrl(url){const id=extractGDriveId(url);return id?`https://drive.google.com/file/d/${id}/preview`:'';}
function getGDThumbUrl(url){const id=extractGDriveId(url);return id?`https://drive.google.com/thumbnail?id=${id}&sz=w400`:'';}
function extractGFormId(url){if(!url)return'';let m=url.match(/\/d\/e\/([a-zA-Z0-9_-]+)/);if(m)return m[1];m=url.match(/viewform/);if(m){let m2=url.match(/\/([a-zA-Z0-9_-]+)\/viewform/);if(m2)return m2[1];}return'';}
function getGFormEmbedUrl(url){const id=extractGFormId(url);return id?`https://docs.google.com/forms/d/e/${id}/viewform?embedded=true`:'';}
function isGFormUrl(url){return url&&url.includes('google.com/forms');}
function isGDUrl(url){return url&&url.includes('drive.google.com');}
function isYTUrl(url){return url&&(url.includes('youtube.com')||url.includes('youtu.be'));}

function updateSettings(){const nm=document.getElementById('setName')?.value?.trim(),em=document.getElementById('setEmail')?.value?.trim();if(!nm||!em){toast('Preencha tudo','er');return;}if(S.user?.r==='admin'){S.user={...S.user,nm,em};}else{const idx=USERS.findIndex(x=>x.id===S.user.id);if(idx>=0){USERS[idx].nm=nm;USERS[idx].em=em;localStorage.setItem('nx_users_v2',JSON.stringify(USERS));S.user=USERS[idx];}}localStorage.setItem('nx_me_v2',JSON.stringify(S.user));toast('Salvo!','ok');render();}

    else{switch(S.pg){case'home':mc=renderHome();break;case'videos':mc=renderVideos();break;case'books':mc=renderBooks();break;case'audios':mc=renderAudios();break;case'courses':mc=renderCoursesPage();break;case'explore':mc=renderExplore();break;case'settings':mc=renderSettingsPage();break;default:mc=renderHome();}}
